name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    outputs:
      vsix-name: ${{ steps.package.outputs.vsix-name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        id: package
        run: |
          VSIX_NAME="oniro-ide-${GITHUB_REF_NAME#v}.vsix"
          npx --no-install @vscode/vsce package -o "$VSIX_NAME"
          echo "vsix-name=$VSIX_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ steps.package.outputs.vsix-name }}
          if-no-files-found: error
          retention-days: 7

  publish-vscode:
    name: Publish to VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath ${{ needs.build.outputs.vsix-name }}

  publish-openvsx:
    name: Publish to Open VSX
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Publish
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish ${{ needs.build.outputs.vsix-name }}

  github-release:
    name: Create GitHub Release
    needs: [build, publish-vscode, publish-openvsx]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build.outputs.vsix-name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
